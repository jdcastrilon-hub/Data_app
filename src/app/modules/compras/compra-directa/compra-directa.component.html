<main class="contenido">
    <mat-card appearance="raised">
        <mat-card-header class="mat-header">
            <mat-card-title>GESTION COMPRA DIRECTA</mat-card-title>
        </mat-card-header>
        <div style="height: 1px; background-color: rgb(201, 199, 199); margin: 1px 0;"></div>

        <mat-card-actions class="mat-accion">
            <button mat-raised-button color="primary" routerLink="/compras/new">Nuevo</button>
        </mat-card-actions>
        <mat-card-content class="mat-content">
            <div class="table-scroll-container">
                <table mat-table [dataSource]="dataSource">
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef>Trans</th>
                        <td mat-cell *matCellDef="let element">{{ element.id_trans}}</td>
                    </ng-container>
                    <ng-container matColumnDef="fecha">
                        <th mat-header-cell *matHeaderCellDef>Fecha</th>
                        <td mat-cell *matCellDef="let element">{{ element.Fecha}}</td>
                    </ng-container>
                    <ng-container matColumnDef="proveedor">
                        <th mat-header-cell *matHeaderCellDef>Nombre</th>
                        <td mat-cell *matCellDef="let element">{{ element.proveedor.nombreCompleto }}</td>
                    </ng-container>
                    <ng-container matColumnDef="numoc">
                        <th mat-header-cell *matHeaderCellDef>Num. OC</th>
                        <td mat-cell *matCellDef="let element">{{ element.NumOC}}</td>
                    </ng-container>
                    <ng-container matColumnDef="remito">
                        <th mat-header-cell *matHeaderCellDef>Remito</th>
                        <td mat-cell *matCellDef="let element">{{ element.Remito}}</td>
                    </ng-container>
                    <ng-container matColumnDef="bodega">
                        <th mat-header-cell *matHeaderCellDef>Bodega</th>
                        <td mat-cell *matCellDef="let element">{{ element.bodega.nomBodega}}</td>
                    </ng-container>
                    <ng-container matColumnDef="importe">
                        <th mat-header-cell *matHeaderCellDef>Total</th>
                        <td mat-cell *matCellDef="let element">{{ element.Importe | currency:'COP':'symbol-narrow':'1.2-2' }}</td>
                    </ng-container>
                    


                    <ng-container matColumnDef="actions">
                        <th mat-header-cell *matHeaderCellDef>Acciones</th>
                        <td mat-cell *matCellDef="let element">
                            <button mat-icon-button (click)="editarBodega(element.id_trans)">
                                <mat-icon>edit</mat-icon>
                            </button>

                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                </table>
            </div>
            <mat-paginator [length]="totalRegistros" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions"
                [pageIndex]="paginaActual" (page)="cambiarPagina($event)" showFirstLastButtons></mat-paginator>
        </mat-card-content>
    </mat-card>
</main>
